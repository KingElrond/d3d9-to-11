name: Build Rust DLL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: nightly-2020-08-01
  TARGET: i686-pc-windows-gnu

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-i686

      - name: Install old Rust nightly
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup +"$RUST_TOOLCHAIN" target add "$TARGET"
          rustup override set "$RUST_TOOLCHAIN"
          rustc --version
          cargo --version

      - name: Fix Cargo config for GNU target
        run: |
          mkdir -p .cargo
          rm -f .cargo/config
          cat > .cargo/config.toml <<'EOF'
          [build]
          target = "i686-pc-windows-gnu"

          [target.i686-pc-windows-gnu]
          linker = "i686-w64-mingw32-gcc"
          rustflags = [
              "-C", "panic=abort",
              "-C", "link-args=toolchain/d3d9.def -Wl,--enable-stdcall-fixup"
          ]
          EOF

      - name: Pin old dependency versions
        run: |
          cat >> Cargo.toml <<'EOF'

          # Old Rust/Cargo compatibility pins for nightly-2020-08-01.
          # This repo has no Cargo.lock, so modern crates otherwise get resolved.
          num-traits = "=0.2.14"
          num-complex = "=0.2.4"
          winapi-util = "=0.1.5"
          termcolor = "=1.1.3"
          memchr = "=2.3.4"
          regex = "=1.3.9"
          aho-corasick = "=0.7.13"
          regex-syntax = "=0.6.18"
          thread_local = "=1.0.1"
          quote = "=1.0.9"
          proc-macro2 = "=1.0.27"
          syn = "=1.0.73"
          log = "=0.4.11"
          lazy_static = "=1.4.0"
          typenum = "=1.12.0"
          cfg-if = "=0.1.10"
          libc = "=0.2.80"
          unicode-segmentation = "=1.7.1"
          EOF

      - name: Build
        run: |
          rm -f Cargo.lock
          cargo +"$RUST_TOOLCHAIN" build --release --target "$TARGET" --no-default-features --verbose

      - name: Upload d3d9.dll
        uses: actions/upload-artifact@v4
        with:
          name: d3d9
          path: target/i686-pc-windows-gnu/release/d3d9.dll
